<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G.A.B.A.H - Konfirmasi Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script> <meta name="referrer" content="no-referrer">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="konsumen.css"> <!-- Menggunakan CSS Konsumen Anda -->
</head>
<body class="p-4 md:p-8 transition-all duration-500">
<!-- Header Section -->
<!-- Menghapus class 'border' dari div utama -->
<div class="max-w-5xl mx-auto flex justify-between items-center mb-8 p-4 rounded-3xl header-container transition-all duration-500">
    
    <!-- Tombol Kembali (Menghapus class 'border' dan 'border-slate-100/700') -->
    <button onclick="history.back()" class="flex items-center justify-center hover:scale-110 transition-all w-12 h-12 bg-slate-50 dark:bg-slate-800 rounded-2xl">
        <i class="fas fa-arrow-left text-slate-600 dark:text-slate-300"></i>
    </button>

    <!-- Judul Tengah -->
    <div class="text-center">
        <h1 class="text-2xl font-black italic tracking-tighter text-[#00AA5B] leading-none">
            CHECKOUT <span class="text-slate-400 dark:text-slate-500">G.A.B.A.H</span>
        </h1>
        <p class="text-[9px] font-bold text-slate-400 dark:text-slate-500 tracking-[0.2em] uppercase mt-1">Konfirmasi Pesanan</p>
    </div>

    <!-- Tombol Aksi Kanan -->
    <div class="flex items-center gap-3">
        <!-- Tombol History -->
        <button onclick="window.location.href='history.html'" 
            class="flex items-center justify-center hover:scale-110 transition-all w-12 h-12 bg-[#FFC107] rounded-2xl shadow-lg shadow-yellow-200/50 dark:shadow-none"
            title="Riwayat Transaksi">
            <i class="fas fa-history text-white"></i>
        </button>

        <!-- Tombol Toggle Tema (Menghapus class 'border' dan 'border-slate-100/700') -->
        <button onclick="toggleTheme()" class="flex items-center justify-center hover:scale-110 transition-all w-12 h-12 bg-slate-50 dark:bg-slate-800 rounded-2xl">
            <i id="themeIcon" class="fas fa-moon text-slate-600 dark:text-yellow-400"></i>
        </button>
    </div>
</div>

    <div class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- SISI KIRI: Alamat & Produk -->
        <div class="lg:col-span-2 space-y-6">
            
            <!-- Lokasi Pengiriman -->
            <div class="product-card p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-black text-xs uppercase text-slate-400">Lokasi Pengiriman</h3>
                    <button onclick="changeAddress()" class="text-[#00AA5B] text-[10px] font-bold">+ Tambah Alamat Baru</button>
                </div>
                <div class="flex items-start gap-4">
                    <div class="p-3 bg-[#ebffef] rounded-xl text-[#00AA5B]">
                        <i class="fas fa-map-marker-alt"></i>
                    </div>
                    <div>
                        <p id="destName" class="font-bold text-sm">Nama User (Default)</p>
                        <p id="destAddress" class="text-xs text-slate-500 leading-relaxed">Alamat lengkap terdeteksi dari profil Anda...</p>
                    </div>
                </div>
            </div>

            <!-- List Produk Berdasarkan Penjual -->
            <div id="checkoutGroupedItems" class="space-y-6">
                <!-- Data Penjual & Produk akan dirender di sini via JS -->
            </div>

            <button onclick="window.location.href='konsumen.html'" class="w-full p-4 border-2 border-dashed border-slate-300 rounded-2xl text-slate-400 font-bold text-xs hover:border-[#00AA5B] hover:text-[#00AA5B] transition-all">
                <i class="fas fa-plus-circle mr-2"></i> Tambahkan Produk Lain
            </button>
        </div>

        <!-- SISI KANAN: Opsi & Ringkasan -->
        <div class="lg:col-span-1 space-y-6">
            
            <!-- Opsi Pengiriman -->
            <div class="product-card p-6">
                <h3 class="font-black text-xs uppercase text-slate-400 mb-4">Metode Pengambilan</h3>
                <div class="space-y-3">
                    <label class="flex items-center gap-3 p-3 border rounded-xl cursor-pointer hover:border-[#00AA5B] transition-all">
                        <input type="radio" name="delivery" value="expedisi" checked onchange="updateTotal()">
                        <span class="text-xs font-bold">Ekspedisi (Antar ke Rumah)</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 border rounded-xl cursor-pointer hover:border-[#00AA5B] transition-all">
                        <input type="radio" name="delivery" value="pickup" onchange="updateTotal()">
                        <span class="text-xs font-bold">Ambil di Lokasi (Self-Pickup)</span>
                    </label>
                </div>
            </div>

            <!-- Ringkasan Bayar -->
<div class="product-card p-6 shadow-2xl border-2 border-[#00AA5B]/20">
    <h3 class="font-black text-xs uppercase text-slate-400 mb-6">Ringkasan Pembayaran</h3>
    
    <div class="space-y-3 mb-6">
        <div class="flex justify-between text-xs font-bold">
            <span>Total Produk</span>
            <span id="subtotalAmount">Rp 0</span>
        </div>
        <div class="flex justify-between text-xs font-bold">
            <span>Ongkos Kirim</span>
            <span id="shippingAmount">Rp 15.000</span>
        </div>
        <div class="flex justify-between text-xs font-bold opacity-50">
            <span>Biaya Layanan</span>
            <span>Rp 2.000</span>
        </div>
        <div class="h-[1px] bg-slate-200 my-4"></div>
        <div class="flex justify-between items-center">
            <span class="font-black text-sm">TOTAL BAYAR</span>
            <span id="totalFinal" class="text-xl font-black text-[#00AA5B]">Rp 0</span>
        </div>
    </div>

<div class="mb-6 p-4 bg-red-50 rounded-xl flex items-center gap-3 border border-red-100">
    <i class="fas fa-qrcode text-[#FF4D4D]"></i>
    <div class="text-[10px] font-bold text-slate-700">
        Pembayaran Otomatis via <span class="text-[#FF4D4D]">QRIS G.A.B.A.H</span>
    </div>
</div>

                <button onclick="processPayment()" class="btn-add-cart w-full py-4 text-sm uppercase tracking-widest">
                    Bayar Sekarang
                </button>



<br>


            <button onclick="window.location.href='history.html'" 
        class="w-full py-4 bg-[#FFC107] text-white rounded-2xl font-black text-sm uppercase tracking-widest hover:bg-[#FFB300] transition-all shadow-lg shadow-yellow-100 flex items-center justify-center gap-2">
        <i class="fas fa-history"></i>
        History Transaksi
    </button>
</div>
        </div>
    </div>

    <!-- Firebase & JS -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="checkout.js"></script>
</body>
</html>
