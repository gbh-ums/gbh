<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G.A.B.A.H - Belanja Produk Distributor</title>
    <script src="https://cdn.tailwindcss.com"></script> <meta name="referrer" content="no-referrer">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="konsumen.css">
</head>
<body class="bg-[#f0f3f7] transition-all duration-500">

<div class="bg-white border-b px-4 py-2">
    <div class="max-w-6xl mx-auto flex flex-wrap justify-between items-center text-[11px] font-medium text-gray-600 gap-3">
        <div class="flex items-center gap-4">
            <!-- Teks "Mode Tamu" dihapus, diganti dengan id kosong -->
            <span id="headerName"><i class="fas fa-user-circle text-gray-300 mr-1"></i> </span>
            <span id="headerPhone"></span>
            <button id="btnLoginRedirect" onclick="window.location.href='../login_sign/login_sign.html'" class="hidden bg-[#00AA5B] text-white px-3 py-1 rounded-full font-bold">Login Sekarang</button>
        </div>
        <div id="headerAddress" class="truncate max-w-[300px]">
            <!-- Alamat dibiarkan kosong sebelum data dimuat -->
        </div>
    </div>
</div>





<header class="header-sticky sticky top-0 bg-white z-[100] px-4 py-3 border-b shadow-md transition-all duration-300">
    <div class="max-w-6xl mx-auto flex items-center justify-between gap-4">
        <h1 class="text-2xl font-black text-[#00AA5B] italic tracking-tighter">G.A.B.A.H</h1>
        
        <div class="flex items-center gap-3">
            <!-- Info Konsumen -->
            <div class="text-right hidden sm:block">
                <p id="userName" class="text-xs font-bold text-gray-800 m-0">Nama Konsumen</p>
                <p id="userLocation" class="text-[10px] text-gray-500 m-0"><i class="fas fa-map-marker-alt"></i> Jakarta, Indonesia</p>
            </div>

            <!-- Tombol Switch Tema -->
            <button onclick="toggleTheme()" class="filter-pill flex items-center gap-2 transition-all">
                <i id="themeIcon" class="fas fa-moon"></i>
                <span id="themeText" class="hidden md:inline">Mode Gelap</span>
            </button>
<!-- Tombol Login (Hanya muncul jika belum login) -->
<button id="btnLoginMain" 
    onclick="window.location.href='../login_sign/login_sign.html'"
    class="bg-[#00AA5B] hover:bg-emerald-600 text-white px-6 py-2 rounded-full font-bold text-sm transition-all shadow-md">
    <i class="fas fa-sign-in-alt mr-2"></i> LOGIN
</button>

<!-- Tombol Logout (Hanya muncul jika sudah login) -->
<button id="btnLogout" 
    onclick="handleLogout()"
    class="hidden bg-red-50 text-red-600 border border-red-200 px-4 py-2 rounded-full font-bold text-sm hover:bg-red-600 hover:text-white transition-all">
    <i class="fas fa-power-off mr-2"></i> KELUAR
</button>
            <!-- Keranjang -->
<button class="relative p-2" onclick="window.location.href='checkout.html'">
    <i class="fas fa-shopping-cart text-xl text-gray-500"></i>
    <span id="cartCount" class="absolute top-0 right-0 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
</button>
        </div>
    </div>
</header>

<!-- SEARCH BAR DI BAWAH HEADER -->
<div class="search-container bg-white px-4 py-3 shadow-sm border-b transition-all duration-300">
    <div class="max-w-6xl mx-auto">
        <div class="search-bar bg-[#f0f3f7] rounded-xl px-4 py-3 flex items-center gap-3 transition-all">
            <i class="fas fa-search text-gray-400"></i>
            <input type="text" id="searchInput" placeholder="Cari beras premium..." class="bg-transparent border-none outline-none w-full text-sm">
        </div>
    </div>




































    <main class="max-w-6xl mx-auto p-4 md:p-6">




        <div class="mb-6">
            <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">Filter Pencarian</p>
            <div class="flex gap-2 overflow-x-auto no-scrollbar py-1">
                <button onclick="filterAction('all')" class="filter-pill active">Lihat Semua</button>
                <button onclick="filterAction('near')" class="filter-pill">Toko Terdekat</button>
                <button onclick="filterAction('grade')" class="filter-pill">Grade Premium</button>
                <button onclick="filterAction('cheap')" class="filter-pill">Harga Terendah</button>
                <button onclick="filterAction('newest')" class="filter-pill">Terbaru</button>

                
            </div>
        </div>






        <div id="radarContainer" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
            </div>
    </main>

    <div id="distroModal" class="fixed inset-0 bg-black/50 z-[300] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md overflow-hidden shadow-2xl animate-popup">
            <div class="p-6">
                <div class="flex justify-between items-start mb-4">
                    <h2 class="text-xl font-black text-gray-800 uppercase">Informasi Distributor</h2>
                    <button onclick="closeDistroModal()" class="text-gray-400 hover:text-black"><i class="fas fa-times"></i></button>
                </div>
                <div id="distroDetails" class="space-y-4">
                    </div>
            </div>
            <div class="bg-gray-50 p-4 border-t flex gap-3">
                <a id="btnChat" href="#" class="flex-1 bg-emerald-500 text-white text-center py-2 rounded-lg font-bold text-sm hover:bg-emerald-600">Hubungi WA</a>
            </div>
        </div>
    </div>

    

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="konsumen.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
    /* Custom style untuk notifikasi agar senada dengan G.A.B.A.H */
    .swal2-styled.swal2-confirm { background-color: #00AA5B !important; }
</style>

</body>
</html>
